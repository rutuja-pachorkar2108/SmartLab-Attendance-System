# Render Blueprint — deploys the whole Lab Attendance System:
#   1. lab-attendance-db   : managed PostgreSQL
#   2. lab-attendance-api  : Express backend  (server/)
#   3. lab-attendance-web  : Next.js frontend (client/)
#
# In Render: New + -> Blueprint -> connect this repo. Render reads this file
# and creates all three. See DEPLOY.md for the full step-by-step.

databases:
  - name: lab-attendance-db
    databaseName: lab_attendance
    user: lab_attendance
    plan: free

services:
  # ---------------------------------------------------------------- Backend API
  - type: web
    name: lab-attendance-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Internal connection string from the managed database above.
      # Internal Render connections don't need SSL, so DATABASE_SSL stays off.
      - key: DATABASE_URL
        fromDatabase:
          name: lab-attendance-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Behind Render's proxy: trust X-Forwarded-For so req.ip is the real
      # client IP (required for the college-network attendance gate to work).
      - key: TRUST_PROXY
        value: "1"
      # Auth — Render generates a strong random secret for you.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: BCRYPT_ROUNDS
        value: "10"
      # College-network gate. YOU must set this to your college's real public
      # IP / CIDR in the Render dashboard, e.g. 203.0.113.5/32
      # (find it by visiting whatismyip.com on the college network).
      # Until you set a real value, attendance marking will be blocked.
      - key: ALLOWED_CIDRS
        sync: false
      # CORS — auth is header-based (no cookies), so "*" is safe.
      - key: CLIENT_ORIGIN
        value: "*"

  # --------------------------------------------------------------- Frontend web
  - type: web
    name: lab-attendance-web
    runtime: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Baked into the frontend at BUILD time. Set this to the backend's public
      # URL once the API service is live, e.g.
      #   https://lab-attendance-api.onrender.com
      # Changing it triggers a rebuild (required for it to take effect).
      - key: NEXT_PUBLIC_API_URL
        sync: false
